<div style="font-family: 'Segoe UI', Arial, sans-serif; max-width: 750px; margin: 20px auto; border: 1px solid #d1d1d1; border-radius: 12px; overflow: hidden; background-color: #ffffff; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
    
    <div style="background-color: #2D3B45; color: white; padding: 25px; text-align: center;">
        <h2 style="margin: 0; color: white; font-size: 22px; letter-spacing: 0.5px;">UAP 5174: Planning Theory & Practice</h2>
        <p style="margin: 5px 0 0 0; opacity: 0.9; font-weight: 300;">Spring 2026 | Thesis & Dissertation Writing Dashboard</p>
        <div id="currentDateDisplay" style="margin-top: 12px; font-size: 14px; opacity: 0.9; font-family: 'Courier New', monospace; font-weight: bold;"></div>
    </div>

    <div style="padding: 30px; text-align: center; background-color: #fcfcfc;">
        <span style="display: block; font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; color: #777; margin-bottom: 5px;">Today's Writing Target</span>
        <span id="canvasDailyTarget" style="display: block; font-size: 72px; font-weight: bold; color: #E00122; line-height: 1;">--</span>
        <span style="display: block; color: #555; margin-top: 10px; font-size: 16px;">words per business day</span>

        <div style="margin: 25px auto 10px auto; width: 85%;">
            <div style="width: 100%; background-color: #e0e0e0; border-radius: 15px; height: 14px; overflow: hidden; border: 1px solid #ddd;">
                <div id="progressBar" style="width: 0%; height: 100%; background: linear-gradient(90deg, #4CAF50, #8BC34A); transition: width 1.5s ease-out;"></div>
            </div>
            <div id="progressText" style="font-size: 12px; color: #666; margin-top: 8px; font-weight: bold;">Calculating semester progress...</div>
        </div>
    </div>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 0;">

    <div style="padding: 20px; border-left: 6px solid #0081C6; margin: 25px; background-color: #f0f7fc; border-radius: 0 8px 8px 0;">
        <h4 style="margin: 0 0 10px 0; color: #0081C6; font-size: 18px;">💡 Tip of the Week</h4>
        <p id="canvasTip" style="font-style: italic; color: #333; line-height: 1.5; margin: 0;">Updating your weekly strategy...</p>
    </div>

    <div style="padding: 20px; background-color: #f5f5f5; margin: 25px; border-radius: 8px; border: 1px solid #eee;">
        <h4 style="margin: 0 0 10px 0; color: #444; font-size: 16px;">📚 In the Academic News</h4>
        <div style="background: white; padding: 15px; border: 1px solid #ddd; border-radius: 4px;">
            <code id="canvasBib" style="display: block; font-size: 11.5px; color: #555; white-space: pre-wrap; word-wrap: break-word; font-family: 'Courier New', monospace;"></code>
        </div>
    </div>

    <script>
        (function() {
            /** * --- SPRING 2026 CONFIGURATION --- 
             */
            const TARGET_WORD_COUNT = 15000;      
            const DEADLINE_DATE = "2026-05-08";  
            const START_OF_TERM = "2026-01-19";  

            const weeklyTips = [
                "Drafting is 'discovery.' Do not edit your first sentence until the last paragraph of the chapter is finished.",
                "Planning Theory Tip: Treat your writing like an incrementalist process. Small, consistent gains beat radical overhauls.",
                "The 'Reverse Outline': After writing a draft, write a one-sentence summary of each paragraph to check your logical flow.",
                "Use 'TK' as a placeholder for citations or data. Don't let a missing date break your momentum.",
                "The Pomodoro Technique: Work for 25 minutes, then force yourself to take a 5-minute screen-free break.",
                "Read your abstract aloud. If you run out of breath during a sentence, it's likely too long for a reviewer.",
                "Manage your energy, not just your time. Tackle the 'Methodology' section when your brain is most alert.",
                "Back up your work using the 3-2-1 rule: 3 copies, 2 different media, 1 offsite (cloud)."
            ];

            const bibs = [
                "@book{fainstein2016readings, title={Readings in Planning Theory}, author={Fainstein, Susan S. and DeFilippis, James}, year={2016}, publisher={John Wiley & Sons}}",
                "@book{flyvbjerg2001making, title={Making Social Science Matter}, author={Flyvbjerg, Bent}, year={2001}, publisher={Cambridge University Press}}",
                "@article{harvey1989flexible, title={From managerialism to entrepreneurialism: the transformation in urban governance}, author={Harvey, David}, journal={Geografiska Annaler}, year={1989}}",
                "@book{jacobs1961death, title={The Death and Life of Great American Cities}, author={Jacobs, Jane}, year={1961}}"
            ];

            function getBusinessDays(start, end) {
                let count = 0;
                let cur = new Date(start.getTime());
                while (cur <= end) {
                    let dayOfWeek = cur.getDay();
                    if (dayOfWeek !== 0 && dayOfWeek !== 6) count++;
                    cur.setDate(cur.getDate() + 1);
                }
                return count;
            }

            const now = new Date();
            const dLine = new Date(DEADLINE_DATE);
            const termStart = new Date(START_OF_TERM);

            // Date & Semester Week Calculation
            const dayFormatted = now.toLocaleDateString('en-GB').replace(/\//g, '-'); // DD-MM-YYYY
            const diffInMs = now - termStart;
            const diffInDays = Math.floor(diffInMs / (1000 * 60 * 60 * 24));
            const weekNum = Math.floor(diffInDays / 7) + 1;
            
            let weekDisplay = (weekNum > 0 && weekNum <= 16) ? "(Week " + weekNum + ")" : "";
            if (weekNum <= 0) weekDisplay = "(Pre-semester)";
            
            document.getElementById('currentDateDisplay').innerText = dayFormatted + " " + weekDisplay;

            // 1. Calculate Target Word Count
            const bizDaysLeft = getBusinessDays(now, dLine);
            const targetDisplay = document.getElementById('canvasDailyTarget');
            
            if (bizDaysLeft <= 0) {
                targetDisplay.innerText = "Final Deadline!";
                targetDisplay.style.fontSize = "40px";
            } else {
                const dailyTarget = Math.ceil(TARGET_WORD_COUNT / bizDaysLeft);
                targetDisplay.innerText = dailyTarget.toLocaleString();
            }

            // 2. Progress Bar Calculation
            const totalDuration = dLine - termStart;
            const elapsed = now - termStart;
            let percent = Math.floor((elapsed / totalDuration) * 100);
            percent = Math.min(Math.max(percent, 0), 100); 
            
            document.getElementById('progressBar').style.width = percent + "%";
            document.getElementById('progressText').innerText = percent + "% of the semester writing period has elapsed";

            // 3. Weekly Rotating Tip
            const startOfYear = new Date(now.getFullYear(), 0, 1);
            const weekOfYear = Math.floor((now - startOfYear) / (7 * 24 * 60 * 60 * 1000));
            const tipIndex = weekOfYear % weeklyTips.length;
            document.getElementById('canvasTip').innerText = weeklyTips[tipIndex];

            // 4. Random Bibliography Spotlight
            const bibIndex = Math.floor(Math.random() * bibs.length);
            document.getElementById('canvasBib').innerText = bibs[bibIndex];

        })();
    </script>
</div>
